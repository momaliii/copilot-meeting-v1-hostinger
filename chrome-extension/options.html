<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 420px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #4f46e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .btn {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #4338ca;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #16a34a;
      display: none;
    }
    .status.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </div>
    <h1>Meeting Copilot Settings</h1>
  </div>

  <label for="appUrl">App URL</label>
  <input type="url" id="appUrl" placeholder="https://your-meeting-copilot.run.app" />
  <p class="hint">The URL where your Meeting Copilot app is hosted. Leave empty to use the default.</p>

  <button id="saveBtn" class="btn">Save</button>
  <p id="status" class="status">Settings saved.</p>

  <script src="options.js"></script>
</body>
</html>
