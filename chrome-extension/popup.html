<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #4f46e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    p {
      font-size: 14px;
      color: #64748b;
      margin-top: 0;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .btn {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-bottom: 12px;
    }
    .btn:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .btn-secondary {
      background-color: white;
      color: #334155;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    .btn-secondary:hover {
      background-color: #f8fafc;
      border-color: #cbd5e1;
    }
    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
    .platforms {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .platform-badge {
      font-size: 11px;
      padding: 4px 8px;
      background-color: #e0e7ff;
      color: #4338ca;
      border-radius: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </div>
    <h3>Meeting Copilot</h3>
  </div>
  
  <p>Record your meetings, get transcripts, summaries, and action items instantly.</p>
  
  <div class="platforms">
    <span class="platform-badge">Google Meet</span>
    <span class="platform-badge">Zoom</span>
    <span class="platform-badge">Teams</span>
  </div>

  <button id="startBtn" class="btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    Open Copilot App
  </button>
  
  <button id="dashboardBtn" class="btn btn-secondary">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
    View Past Meetings
  </button>

  <div class="footer">
    Powered by Gemini 2.5 Flash
  </div>

  <a id="settingsLink" href="#" style="font-size: 12px; color: #64748b; margin-top: 8px; display: block;">Settings</a>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
