<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    .popup-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #e2e8f0;
      background: white;
    }
    .popup-logo {
      width: 28px; height: 28px;
      background-color: #4f46e5;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; flex-shrink: 0;
      overflow: hidden;
    }
    .popup-logo img { width: 100%; height: 100%; object-fit: contain; }
    .popup-title { font-size: 16px; font-weight: 700; flex: 1; }
    .connection-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }
    .connection-dot.online { background: #22c55e; }
    .connection-dot.offline { background: #ef4444; }

    .popup-body { padding: 16px 20px; }

    /* Recording active state */
    .rec-banner {
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: none;
    }
    .rec-banner.active { display: block; }
    .rec-banner.paused {
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border-color: #fde68a;
    }
    .rec-platform {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #dc2626; margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .rec-banner.paused .rec-platform { color: #d97706; }
    .rec-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #dc2626;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .rec-banner.paused .rec-dot { background: #d97706; animation: none; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .rec-timer {
      font-size: 28px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #0f172a; margin-bottom: 10px;
    }
    .rec-actions { display: flex; gap: 8px; }
    .rec-actions button {
      flex: 1; padding: 8px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: none;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: all 0.15s;
    }
    .rec-pause-btn {
      background: white; color: #334155;
      border: 1px solid #e2e8f0 !important;
    }
    .rec-pause-btn:hover { background: #f8fafc; }
    .rec-stop-btn { background: #dc2626; color: white; }
    .rec-stop-btn:hover { background: #b91c1c; }

    /* Idle buttons */
    .btn-stack { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      padding: 11px 16px; border-radius: 10px;
      cursor: pointer; width: 100%;
      font-weight: 600; font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s; border: none;
    }
    .btn-primary {
      background: #4f46e5; color: white;
      box-shadow: 0 2px 4px rgba(79,70,229,0.25);
    }
    .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
    .btn-secondary {
      background: white; color: #334155;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }

    .platforms {
      display: flex; gap: 6px;
      margin-bottom: 14px;
    }
    .platform-badge {
      font-size: 10px; padding: 3px 8px;
      background: #e0e7ff; color: #4338ca;
      border-radius: 4px; font-weight: 600;
    }

    .description {
      font-size: 13px; color: #64748b;
      margin-bottom: 14px; line-height: 1.5;
    }

    /* Recent recordings */
    .recent-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
      display: none;
    }
    .recent-section.has-items { display: block; }
    .recent-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #94a3b8; margin-bottom: 8px;
    }
    .recent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
      margin-bottom: 2px;
    }
    .recent-item:hover { background: #f1f5f9; }
    .recent-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      color: #64748b; flex-shrink: 0;
    }
    .recent-info { flex: 1; min-width: 0; }
    .recent-name {
      font-size: 13px; font-weight: 500;
      color: #0f172a; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .recent-meta {
      font-size: 11px; color: #94a3b8;
    }

    .popup-footer {
      padding: 12px 20px;
      border-top: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
      background: white;
    }
    .footer-text { font-size: 11px; color: #94a3b8; }
    .settings-link {
      font-size: 11px; color: #64748b;
      text-decoration: none; cursor: pointer;
    }
    .settings-link:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo" id="logoContainer">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </div>
    <span class="popup-title" id="siteName">Meeting Copilot</span>
    <div class="connection-dot" id="connectionDot" title="Checking connection..."></div>
  </div>

  <div class="popup-body">
    <!-- Recording banner (hidden by default) -->
    <div class="rec-banner" id="recBanner">
      <div class="rec-platform">
        <div class="rec-dot"></div>
        <span id="recPlatform">Recording</span>
      </div>
      <div class="rec-timer" id="recTimer">0:00</div>
      <div class="rec-actions">
        <button class="rec-pause-btn" id="pauseBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          Pause
        </button>
        <button class="rec-stop-btn" id="stopBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Stop
        </button>
      </div>
    </div>

    <!-- Idle state -->
    <div id="idleState">
      <p class="description">Record your meetings, get transcripts, summaries, and action items instantly.</p>
      <div class="platforms">
        <span class="platform-badge">Google Meet</span>
        <span class="platform-badge">Zoom</span>
        <span class="platform-badge">Teams</span>
      </div>
      <div class="btn-stack">
        <button id="startBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          Open App
        </button>
        <button id="dashboardBtn" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
          Past Meetings
        </button>
      </div>
    </div>

    <!-- Recent recordings -->
    <div class="recent-section" id="recentSection">
      <div class="recent-title">Recent Recordings</div>
      <div id="recentList"></div>
    </div>
  </div>

  <div class="popup-footer">
    <span class="footer-text">Powered by Gemini 2.5 Flash</span>
    <a class="settings-link" id="settingsLink" href="#">Settings</a>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
